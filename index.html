<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kreator Tortów</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    
    <div class="form-section">
      <h2>Zbuduj swój wymarzony tort! 🎂</h2>
      <p>Wypełnij poniższy formularz, a po prawej stronie zobaczysz podgląd swojego zamówienia.</p>
      
      <form action="https://api.web3forms.com/submit" method="POST" id="cake-form">
        <input type="hidden" name="access_key" value="ab73b2c8-e387-4d2a-8e71-a8e7809fc7e2">
        <input type="hidden" name="redirect" value="https://web3forms.com/success">

        <fieldset>
          <legend>Dane kontaktowe</legend>
          <label>Imię i nazwisko:
            <input type="text" name="name" placeholder="Jan Kowalski" required>
          </label>
          <label>Email:
            <input type="email" name="email" placeholder="jan@example.com" required>
          </label>
          <label>Data odbioru:
            <input type="date" name="delivery_date" required>
          </label>
        </fieldset>

        <fieldset>
          <legend>Kreator Tortu</legend>
          
          <label>Wielkość (Ilość porcji):
            <select name="size" id="size" required>
              <option value="Mały (6-8 porcji)">Mały (6-8 porcji)</option>
              <option value="Średni (10-14 porcji)" selected>Średni (10-14 porcji)</option>
              <option value="Duży (16-20 porcji)">Duży (16-20 porcji)</option>
            </select>
          </label>

          <label>Smak biszkoptu:
            <select name="sponge" id="sponge" required>
              <option value="jasny">Jasny (Waniliowy)</option>
              <option value="ciemny">Ciemny (Kakaowy)</option>
              <option value="red_velvet">Red Velvet</option>
            </select>
          </label>

          <label>Smak kremu głównego:
            <select name="cream" id="cream" required>
              <option value="smietankowy">Śmietankowy (Biały)</option>
              <option value="czekoladowy">Czekoladowy (Brązowy)</option>
              <option value="malinowy">Malinowy (Różowy)</option>
              <option value="pistacjowy">Pistacjowy (Zielony)</option>
            </select>
          </label>

          <label>Dodatki:
            <div class="checkbox-group">
              <label><input type="checkbox" name="addons" id="addon_fruits" value="Świeże owoce"> Świeże owoce na górze</label>
              <label><input type="checkbox" name="addons" id="addon_crunch" value="Chrupka pralinowa"> Chrupka pralinowa w środku</label>
              <label><input type="checkbox" name="addons" id="addon_drip" value="Czekoladowy Drip"> Czekoladowy drip</label>
            </div>
          </label>
        </fieldset>

        <fieldset>
          <legend>Szczegóły</legend>
          <label>Wiadomość / Motyw na tort:
            <textarea name="message" rows="4" placeholder="Opisz, jak ma wyglądać Twój tort (np. napis na topperze, motyw z bajki...)" required></textarea>
          </label>
        </fieldset>

        <button type="submit">Złóż zamówienie</button>
      </form>
    </div>

    <div class="preview-section">
      <div class="sticky-preview">
        <h3>Podgląd zamówienia</h3>
        
        <div class="cake-visual">
          <div class="fruits hidden" id="preview-fruits">🍓🫐🍓</div>
          <div class="drip hidden" id="preview-drip"></div>
          <div class="cake-layer cream" id="preview-cream"></div>
          <div class="cake-layer sponge" id="preview-sponge"></div>
          <div class="plate"></div>
        </div>

        <div class="summary">
          <p><strong>Rozmiar:</strong> <span id="sum-size">Średni (10-14 porcji)</span></p>
          <p><strong>Biszkopt:</strong> <span id="sum-sponge">Jasny (Waniliowy)</span></p>
          <p><strong>Krem:</strong> <span id="sum-cream">Śmietankowy (Biały)</span></p>
          <p><strong>Dodatki:</strong> <span id="sum-addons">Brak</span></p>
        </div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
